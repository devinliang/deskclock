<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復古風時鐘</title>
    <style>
        /* 引入襯線字體，增加古典感 */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');

        :root {
            --bg-wood: #2c1e14;
            --brass-light: #f5d061;
            --brass-dark: #b8860b;
            --face-bg: #f4e4bc;
            --face-shadow: #dcc289;
            --hand-color: #1a1a1a;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-wood);
            /* 模擬木紋背景 (紋理維持像素單位比較細緻) */
            background-image: repeating-linear-gradient(45deg, #3d2b1f 0px, #3d2b1f 2px, #2c1e14 2px, #2c1e14 8px);
            margin: 0;
            overflow: hidden; /* 防止捲軸出現 */
            font-family: 'Cinzel', serif;
        }

        /* 時鐘主體 */
        .clock {
            /* 關鍵修改：使用 vmin 單位 */
            width: 80vmin;  /* 佔據螢幕短邊的 80% */
            height: 80vmin;
            border-radius: 50%;
            position: relative;
            /* 黃銅邊框效果 - 比例放大 */
            border: 3vmin solid #b8860b;
            box-shadow: 
                0 0 0 1vmin #8b6508, 
                0 5vmin 12vmin rgba(0,0,0,0.8), 
                inset 0 0 8vmin rgba(0,0,0,0.5);
            background: radial-gradient(circle, var(--face-bg) 60%, var(--face-shadow) 100%);
        }

        /* 鐘面上的刻度數字容器 */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            color: #2b1d0e;
            font-size: 6.5vmin; /* 字體跟著放大 */
            font-weight: bold;
            padding-top: 4vmin; /* 距離邊緣的距離 */
            box-sizing: border-box;
            pointer-events: none;
        }

        /* 中心裝飾點 (黃銅蓋) */
        .center-nut {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5vmin; /* 放大 */
            height: 5vmin;
            background: radial-gradient(circle, var(--brass-light), var(--brass-dark));
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0.5vmin 0.5vmin 1vmin rgba(0,0,0,0.4);
            border: 0.2vmin solid #5c4002;
        }

        /* 指針共用設定 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            border-radius: 50% 50% 0 0;
            z-index: 5;
            box-shadow: 0.4vmin 0.4vmin 1vmin rgba(0,0,0,0.3);
        }

        /* 時針 */
        .hour-hand {
            width: 2.5vmin;
            height: 22vmin; /* 調整長度比例 */
            background: var(--hand-color);
            border-radius: 2vmin;
        }
        .hour-hand::before {
            content: '';
            position: absolute;
            top: 2.5vmin;
            left: -1vmin;
            width: 4.5vmin;
            height: 4.5vmin;
            border-radius: 50%;
            background: var(--hand-color);
        }

        /* 分針 */
        .min-hand {
            width: 1.5vmin;
            height: 30vmin; /* 調整長度比例 */
            background: var(--hand-color);
            border-radius: 1vmin;
        }

        /* 秒針 */
        .second-hand {
            width: 0.5vmin;
            height: 36vmin; /* 調整長度比例 */
            background: #a52a2a;
            transform-origin: 50% 80%; 
            /* 修正位置：配合 vmin 的長度與軸心計算 */
            /* 軸心在 80%，代表尾巴長度是 20% * 36vmin = 7.2vmin */
            /* 所以要往下位移 7.2vmin */
            bottom: calc(50% - 7.2vmin);
            z-index: 6;
            border-radius: 0;
        }
        
        .second-hand::after {
            content: '';
            position: absolute;
            bottom: 1.2vmin;
            left: -1vmin;
            width: 2.5vmin;
            height: 2.5vmin;
            border-radius: 50%;
            background: #a52a2a;
        }

        /* 品牌字樣 */
        .brand-text {
            position: absolute;
            top: 65%;
            width: 100%;
            text-align: center;
            font-size: 2.5vmin;
            letter-spacing: 0.5vmin;
            color: #665;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="clock" id="clock-face">
        <!-- 裝飾文字 -->
        <div class="brand-text">天涯過客</div>
        
        <!-- 中心裝飾 -->
        <div class="center-nut"></div>

        <!-- 指針 -->
        <div class="hand hour-hand"></div>
        <div class="hand min-hand"></div>
        <div class="hand second-hand"></div>
    </div>

    <script>
        const clockFace = document.getElementById('clock-face');
        const secondHand = document.querySelector('.second-hand');
        const minHand = document.querySelector('.min-hand');
        const hourHand = document.querySelector('.hour-hand');

        const romanNumerals = [
            'XII', 'I', 'II', 'III', 'IV', 'V', 
            'VI', 'VII', 'VIII', 'IX', 'X', 'XI'
        ];

        function createNumbers() {
            for (let i = 0; i < 12; i++) {
                const numDiv = document.createElement('div');
                numDiv.classList.add('number');
                const rotation = i * 30;
                numDiv.style.transform = `rotate(${rotation}deg)`;
                numDiv.innerHTML = `<span style="display:inline-block;">${romanNumerals[i]}</span>`;
                clockFace.appendChild(numDiv);
            }
        }

        function setDate() {
            const now = new Date();
            const seconds = now.getSeconds();
            const mins = now.getMinutes();
            const hours = now.getHours();

            const secondsDegrees = (seconds * 6); 
            const minsDegrees = (mins * 6) + (seconds * 0.1); 
            const hoursDegrees = (hours * 30) + (mins * 0.5);
            
            secondHand.style.transform = `translateX(-50%) rotate(${secondsDegrees}deg)`;
            minHand.style.transform = `translateX(-50%) rotate(${minsDegrees}deg)`;
            hourHand.style.transform = `translateX(-50%) rotate(${hoursDegrees}deg)`;
        }

        createNumbers();
        setInterval(setDate, 1000);
        setDate();
    </script>
</body>
</html>
